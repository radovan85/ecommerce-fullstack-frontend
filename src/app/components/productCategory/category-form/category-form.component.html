<app-navbar></app-navbar>
<section style="font-family: Oswald, sans-serif;">
    <div class="box">
        <div class="form">
            <h2>Category Form</h2>
            <form (ngSubmit)="addCategory()">
                <div class="inputbox">
                    <input type="text" id="name" name="name" [(ngModel)]="category.name" placeholder="Category name">
                    <span class="label-danger" id="nameError">Not Empty!Maximum 40 letters allowed!</span>
                </div>

                <div class="inputbox">
                    <input type="submit" value="Submit" />
                </div>
            </form>
        </div>
    </div>
</section>
